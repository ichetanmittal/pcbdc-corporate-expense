const fmtINR = n => '₹' + Number(n).toLocaleString('en-IN');
const fmtINRCompact = n => {
  if (n>=10000000) return '₹'+(n/10000000).toFixed(2)+' Cr';
  if (n>=100000)   return '₹'+(n/100000).toFixed(2)+' L';
  if (n>=1000)     return '₹'+(n/1000).toFixed(1)+' K';
  return '₹'+n;
};

/* ============================================================
   ROUTING
   ============================================================ */
function nav(view, payload) {
  state.view = view;
  if (payload) Object.assign(state, payload);
  window.scrollTo(0,0);
  render();
}

function login(role){
  const userMap = {
    'Merchant Admin': data.users[0],
    'Merchant Operator': data.users[1],
    'Merchant Approver': data.users[2],
    'Merchant Viewer': data.users[3],
    'Bank Admin': data.bankUsers[0],
  };
  state.pendingRole = role;
  state.pendingUser = userMap[role];
  state.view = 'mfa';
  render();
}

function verifyMfa(){
  state.auth = { loggedIn:true, role:state.pendingRole, user:state.pendingUser };
  state.view = state.pendingRole==='Bank Admin' ? 'bank-dashboard' : 'dashboard';
  state.pendingRole = null;
  toast('Logged in successfully');
  render();
}

function logout(){
  state.auth = { loggedIn:false, role:null, user:null };
  state.view = 'login';
  render();
}

function switchRole(role){
  if (role===state.auth.role) return;
  const userMap = {
    'Merchant Admin': data.users[0],
    'Merchant Operator': data.users[1],
    'Merchant Approver': data.users[2],
    'Merchant Viewer': data.users[3],
    'Bank Admin': data.bankUsers[0],
  };
  state.auth = { loggedIn:true, role, user:userMap[role] };
  state.view = role==='Bank Admin' ? 'bank-dashboard' : 'dashboard';
  toast('Switched to ' + role);
  render();
}

function toast(msg){
  state.toast = msg;
  render();
  setTimeout(()=>{ state.toast=null; render(); }, 2200);
}

function openModal(name, payload){ state.modal = { name, payload }; render(); }
function closeModal(){ state.modal = null; render(); }

/* ============================================================
   APPROVAL FLOW (the headline demo)
   ============================================================ */
function approveTxn(id){
  const t = data.transactions.find(x=>x.id===id);
  if (!t) return;
  t.status = 'Success';
  t.checker = state.auth.user.name;
  data.auditLogs.unshift({
    ts: new Date().toISOString().replace('T',' ').slice(0,19),
    userId: state.auth.user.id, userName: state.auth.user.name,
    merchantId: data.corporate.id,
    action:'Disbursement.Approve', details:`${id} — Approved & Executed`,
    ip:'49.36.x.x', status:'Success'
  });
  closeModal();
  toast(`${id} approved & executed on CBDC rail`);
}
function rejectTxn(id, reason){
  const t = data.transactions.find(x=>x.id===id);
  if (!t) return;
  t.status = 'Rejected';
  t.checker = state.auth.user.name;
  t.failureReason = 'Approver: ' + (reason || 'rejected');
  data.auditLogs.unshift({
    ts: new Date().toISOString().replace('T',' ').slice(0,19),
    userId: state.auth.user.id, userName: state.auth.user.name,
    merchantId: data.corporate.id,
    action:'Disbursement.Reject', details:`${id} — ${reason||'rejected'}`,
    ip:'49.36.x.x', status:'Success'
  });
  closeModal();
  toast(`${id} rejected`);
}
function createDisbursement(form){
  const id = 'TXN' + new Date().toISOString().replace(/[-:T.Z]/g,'').slice(0,14);
  data.transactions.unshift({
    id, type:'Single', amount:Number(form.amount),
    beneficiary: form.beneficiaryName, beneficiaryHandle: form.beneficiaryHandle,
    rule: form.rule, status:'Pending Approval',
    maker: state.auth.user.name, checker:'—',
    timestamp: new Date().toISOString().replace('T',' ').slice(0,16),
  });
  data.auditLogs.unshift({
    ts: new Date().toISOString().replace('T',' ').slice(0,19),
    userId: state.auth.user.id, userName: state.auth.user.name,
    merchantId: data.corporate.id,
    action:'Disbursement.Initiate', details:`${id} — ${fmtINR(form.amount)} to ${form.beneficiaryHandle}`,
    ip:'49.36.x.x', status:'Success'
  });
  toast(`${id} sent for approval`);
  nav('disbursement-single');
}

/* ============================================================
   MASTER RENDER
   ============================================================ */
function render(){
  const root = document.getElementById('app');
  if (!state.auth.loggedIn){
    root.innerHTML = state.view==='mfa' ? viewMfa() : viewLogin();
  } else {
    root.innerHTML = appShell();
  }
  if (state.modal) document.body.insertAdjacentHTML('beforeend', renderModal());
  if (state.toast) document.body.insertAdjacentHTML('beforeend', renderToast());
  // Re-apply tour spotlight & overlay after any render so they survive nav/toast/role-switch
  if (state.tour.active){
    setTimeout(()=>{
      const step = tourSteps[state.tour.step];
      if (step?.target){
        document.querySelectorAll('.tour-spotlight').forEach(x=>x.classList.remove('tour-spotlight'));
        const el = document.querySelector(step.target);
        if (el) el.classList.add('tour-spotlight');
      }
      if (!document.getElementById('tour-tooltip')) renderTourOverlay();
    }, 50);
  }
}

function renderModal(){
  const m = state.modal;
  if (!m) return '';
  const body = (() => {
    switch(m.name){
      case 'roleSwitcher':   return modalRoleSwitcher();
      case 'txnDetail':      return modalTxnDetail(m.payload?.id);
      case 'approveConfirm': return modalApproveConfirm(m.payload?.id);
      case 'rejectConfirm':  return modalRejectConfirm(m.payload?.id);
      case 'createSubWallet':return modalCreateSubWallet();
      case 'createUser':     return modalCreateUser();
      case 'createRule':     return modalCreateRule();
      case 'createSR':       return modalCreateSR();
      case 'createBankUser': return modalCreateBankUser();
    }
    return '';
  })();
  return `
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm fade-in" onclick="closeModal()">
    <div onclick="event.stopPropagation()" class="bg-white rounded-xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-auto">${body}</div>
  </div>`;
}

function startTour(){
  state.tour.active = true;
  state.tour.step = 0;
  state.tour.autoplay = false;
  closeModal();
  runTourStep();
}

function tourNext(){
  if (state.tour.step >= tourSteps.length-1){ endTour(); return; }
  state.tour.step++;
  runTourStep();
}

function tourPrev(){
  if (state.tour.step === 0) return;
  state.tour.step--;
  runTourStep();
}

function tourToggleAutoplay(){
  state.tour.autoplay = !state.tour.autoplay;
  if (state.tour.autoplay) scheduleAutoplay();
  else if (state.tour.autoplayTimer){ clearTimeout(state.tour.autoplayTimer); state.tour.autoplayTimer=null; }
  renderTourOverlay();
}

function scheduleAutoplay(){
  if (state.tour.autoplayTimer) clearTimeout(state.tour.autoplayTimer);
  state.tour.autoplayTimer = setTimeout(()=>{
    if (state.tour.active && state.tour.autoplay){
      if (state.tour.step >= tourSteps.length-1){ state.tour.autoplay=false; renderTourOverlay(); return; }
      tourNext();
    }
  }, 5500);
}

function endTour(){
  state.tour.active = false;
  state.tour.step = 0;
  if (state.tour.autoplayTimer){ clearTimeout(state.tour.autoplayTimer); state.tour.autoplayTimer=null; }
  state.tour.autoplay = false;
  document.querySelectorAll('.tour-spotlight').forEach(el=>el.classList.remove('tour-spotlight'));
  document.querySelectorAll('#tour-overlay,#tour-tooltip').forEach(el=>el.remove());
  render();
}

function runTourStep(){
  const step = tourSteps[state.tour.step];
  document.querySelectorAll('.tour-spotlight').forEach(el=>el.classList.remove('tour-spotlight'));
  if (step.setup) step.setup();
  setTimeout(()=>{
    if (step.target){
      const el = document.querySelector(step.target);
      if (el){
        el.classList.add('tour-spotlight');
        el.scrollIntoView({behavior:'smooth', block:'center'});
      }
    }
    renderTourOverlay();
    if (state.tour.autoplay) scheduleAutoplay();
  }, 80);
}

function renderTourOverlay(){
  document.querySelectorAll('#tour-overlay,#tour-tooltip').forEach(el=>el.remove());
  if (!state.tour.active) return;
  const step = tourSteps[state.tour.step];
  const total = tourSteps.length;
  const idx = state.tour.step + 1;
  const overlay = document.createElement('div');
  overlay.id = 'tour-overlay';
  overlay.className = 'fixed inset-0 z-[60] pointer-events-none';
  document.body.appendChild(overlay);

  const tip = document.createElement('div');
  tip.id = 'tour-tooltip';
  tip.className = 'fixed inset-x-0 bottom-6 z-[70] flex justify-center px-4 pointer-events-none tour-tooltip';
  tip.innerHTML = `
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg pointer-events-auto border border-slate-200 overflow-hidden">
      <div class="px-5 py-3 bg-gradient-to-r from-brand-700 to-brand-900 text-white flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="text-xs font-semibold tracking-wider uppercase opacity-80">${step.section}</div>
          <span class="text-xs opacity-60">·</span>
          <div class="text-xs font-medium">Step ${idx} of ${total}</div>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="tourToggleAutoplay()" class="text-xs flex items-center gap-1 px-2 py-1 rounded-full ${state.tour.autoplay?'bg-white text-brand-700':'bg-white/20 hover:bg-white/30'}" title="Auto-play">
            ${state.tour.autoplay?'<span class="w-2 h-2 bg-rose-500 rounded-full"></span> Auto-playing':'▶︎ Auto-play'}
          </button>
          <button onclick="endTour()" class="text-xs px-2 py-1 rounded-full bg-white/20 hover:bg-white/30">✕ Skip</button>
        </div>
      </div>
      <div class="px-5 py-4">
        <div class="font-bold text-slate-900 text-base mb-1.5">${step.title}</div>
        <div class="text-sm text-slate-600 leading-relaxed">${step.body}</div>
      </div>
      <div class="px-5 pb-3">
        <div class="flex gap-1 mb-3">
          ${tourSteps.map((_,i)=>`<div class="h-1 flex-1 rounded-full ${i<idx?'bg-brand-700':'bg-slate-200'} transition"></div>`).join('')}
        </div>
        <div class="flex justify-between items-center">
          <button onclick="tourPrev()" ${idx===1?'disabled':''} class="text-sm px-3 py-1.5 rounded-md border border-slate-300 hover:bg-slate-50 disabled:opacity-30 disabled:cursor-not-allowed">← Prev</button>
          <div class="text-xs text-slate-400">Esc to exit</div>
          <button onclick="tourNext()" class="text-sm px-4 py-1.5 rounded-md bg-brand-700 hover:bg-brand-800 text-white font-medium">${idx===total?'Finish ✓':'Next →'}</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(tip);
}

document.addEventListener('keydown', e=>{
  if (!state.tour.active) return;
  if (e.key==='Escape') endTour();
  else if (e.key==='ArrowRight') tourNext();
  else if (e.key==='ArrowLeft') tourPrev();
});
